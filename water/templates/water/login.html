<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AquaBiz – Kirish</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary: #0ea5e9; --accent: #06b6d4; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #0c4a6e 50%, #164e63 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-wrap {
      width: 100%; max-width: 420px;
    }
    .login-logo {
      text-align: center; margin-bottom: 32px;
    }
    .logo-icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 34px; margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(14,165,233,.45);
    }
    .logo-title { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .logo-sub   { font-size: 14px; color: #94a3b8; margin-top: 4px; }

    .login-card {
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 36px 36px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .card-title { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
    .card-sub   { font-size: 13px; color: #64748b; margin-bottom: 28px; }

    .form-group  { margin-bottom: 18px; }
    .form-label  { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 7px; }
    .input-wrap  { position: relative; }
    .input-icon  { position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: #94a3b8; font-size: 15px; }
    .form-control {
      width: 100%; padding: 12px 14px 12px 40px;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: 14px; color: #0f172a; font-family: inherit;
      transition: border .2s, box-shadow .2s; background: #fff;
    }
    .form-control:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14,165,233,.12);
    }
    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 16px rgba(14,165,233,.35);
      transition: transform .2s, box-shadow .2s; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(14,165,233,.45); }
    .alert {
      padding: 12px 14px; background: #fee2e2; border: 1px solid #fecaca;
      border-radius: 8px; color: #991b1b; font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 8px; margin-bottom: 18px;
    }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0 16px; }
    .hint { font-size: 12px; color: #94a3b8; text-align: center; }
    .hint strong { color: #475569; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon">💧</div>
    <div class="logo-title">AquaBiz</div>
    <div class="logo-sub">Suv Tarqatish Boshqaruv Tizimi</div>
  </div>

  <div class="login-card">
    <div class="card-title">Xush kelibsiz! 👋</div>
    <div class="card-sub">Davom etish uchun tizimga kiring</div>

    {% for message in messages %}
      <div class="alert"><i class="fa-solid fa-circle-xmark"></i> {{ message }}</div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Foydalanuvchi nomi</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" name="username" class="form-control" placeholder="username" required autofocus>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Parol</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i> Kirish
      </button>
    </form>

    <hr class="divider">
    <div class="hint">
      Default: <strong>admin</strong> / <strong>admin123</strong> &nbsp;|&nbsp;
      <a href="/admin/" style="color:#0ea5e9">Admin panel</a>
    </div>
  </div>
</div>
</body>
</html>
