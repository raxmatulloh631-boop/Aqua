{% extends 'base.html' %}
{% block title %}{{ action }} Mahsulot – AquaBiz{% endblock %}
{% block page_title %}💧 Mahsulot {{ action }}{% endblock %}

{% block content %}
<div style="max-width:540px">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Mahsulot ma'lumotlari</span>
    </div>
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label">Mahsulot nomi *</label>
          <input type="text" name="name" class="form-control"
            value="{{ product.name|default:'' }}" placeholder="BIOLIFE 19L, Aqua 5L ..." required>
        </div>

        <div class="form-group">
          <label class="form-label">Narxi (so'm) *</label>
          <input type="number" name="price" class="form-control"
            value="{{ product.price|default:'' }}" placeholder="5000" min="0" step="any" required>
        </div>

        <div class="form-group">
          <label class="form-label">Ombordagi qoldiq (dona)</label>
          <input type="number" name="stock" class="form-control"
            value="{{ product.stock|default:'0' }}" placeholder="100" min="0">
        </div>

        <div class="form-group" style="margin-top: 15px;">
          <label class="form-label">Mahsulot rasmi</label>
          <input type="file" name="image" class="form-control" accept="image/*">
          {% if product.image %}
            <div style="margin-top: 10px;">
              <img src="{{ product.image.url }}" alt="{{ product.name }}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 5px; margin-top: 5px; border: 1px solid #ddd;">
            </div>
          {% endif %}
        </div>

        <div style="display:flex;gap:10px;margin-top:24px">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-check"></i> Saqlash
          </button>
          <a href="{% url 'product_list' %}" class="btn btn-outline">Bekor qilish</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
