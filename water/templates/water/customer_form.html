{% extends 'base.html' %}
{% block title %}{{ action }} Mijoz – AquaBiz{% endblock %}
{% block page_title %}👤 Mijoz {{ action }}{% endblock %}

{% block content %}
<div style="max-width:540px">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Mijoz ma'lumotlari</span>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Mijoz / Kompaniya nomi *</label>
          <input type="text" name="name" class="form-control"
            value="{{ customer.name|default:'' }}" placeholder="Hilol Market, Sardor aka ..." required>
        </div>
        <div class="form-group">
          <label class="form-label">Telefon raqami *</label>
          <input type="text" name="phone" class="form-control"
            value="{{ customer.phone|default:'' }}" placeholder="+998 90 123 45 67" required>
        </div>
        <div class="form-group">
          <label class="form-label">Manzil</label>
          <textarea name="address" class="form-control" rows="3"
            placeholder="Toshkent sh., Yunusobod tumani ...">{{ customer.address|default:'' }}</textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:24px">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-check"></i> Saqlash
          </button>
          <a href="{% url 'customer_list' %}" class="btn btn-outline">Bekor qilish</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
